name: CI/CD ReactJS

on:
  push:
    branches: [ main, dev ]
    paths:
      - 'FE/my-app/**'
  pull_request:
    branches: [ main, dev ]
    paths:
      - 'FE/my-app/**'
  workflow_dispatch:

env:
  DOCKER_USERNAME: tam019
  DOCKER_IMAGE_NAME: solar-app

jobs:
  # CI Job
  ci:
    name: Test & Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ./FE/my-app/package-lock.json
      
      - name: Install dependencies
        run: |
          cd FE/my-app
          npm ci
      
      - name: Build
        run: |
          cd FE/my-app
          npm run build
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: ./FE/my-app/dist
          retention-days: 1
      
      - name: CI Success
        run: echo "✅ CI completed successfully!"

  # CD Job - Chỉ chạy khi push vào main/dev
  cd:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ./FE/my-app/package-lock.json
      
      - name: Install and Build
        run: |
          cd FE/my-app
          npm ci
          npm run build
      
      - name: Get branch name
        id: branch
        run: |
          BRANCH=${GITHUB_REF#refs/heads/}
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./FE/my-app
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ steps.branch.outputs.branch }}
            ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest
      
      - name: CD Success
        run: |
          echo "✅ Docker image pushed successfully!"
          echo "📦 Image: ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ steps.branch.outputs.branch }}"