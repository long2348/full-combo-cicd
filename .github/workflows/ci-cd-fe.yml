name: CI/CD ReactJS

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'FE/my-app/**'
  pull_request:
    branches:
      - main
      - dev
    paths:
      - 'FE/my-app/**'
  workflow_dispatch:  # Cho phép chạy thủ công từ GitHub UI

env:
  DOCKER_USERNAME: tam019
  DOCKER_IMAGE_NAME: solar-app
  WORKING_DIR: ./FE/my-app

jobs:
  # CI Job - Kiểm tra code trên cả dev và main
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json
      
      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: npm ci
      
      - name: Run lint (nếu có)
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          if npm run | grep -q "lint"; then
            npm run lint
          else
            echo "⚠️ No lint script found, skipping..."
          fi
      
      - name: Run tests (nếu có)
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          if npm run | grep -q "test"; then
            npm run test -- --watchAll=false --passWithNoTests
          else
            echo "⚠️ No test script found, skipping..."
          fi
      
      - name: Build project
        working-directory: ${{ env.WORKING_DIR }}
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-files-${{ github.ref_name }}
          path: ${{ env.WORKING_DIR }}/dist
          retention-days: 1

  # CD Job - Deploy cho dev và main với tag khác nhau
  cd:
    name: Continuous Deployment
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && needs.ci.result == 'success'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json
      
      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: npm ci
      
      - name: Build project
        working-directory: ${{ env.WORKING_DIR }}
        run: npm run build
      
      - name: Get version from git
        id: get_version
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          CURRENT_TAG=$(git tag --points-at HEAD 2>/dev/null | head -n1)
          
          if [ -n "$CURRENT_TAG" ]; then
            VERSION="$CURRENT_TAG"
          else
            VERSION="${LATEST_TAG}-${BRANCH_NAME}-${COMMIT_HASH}"
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH_NAME" >> $GITHUB_OUTPUT
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ${{ env.WORKING_DIR }}
          push: true
          tags: |
            # Tag với version đầy đủ
            ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ steps.get_version.outputs.version }}
            # Tag theo branch (dev hoặc main)
            ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ steps.get_version.outputs.branch }}
            # Tag latest chỉ cho main branch
            ${{ steps.get_version.outputs.branch == 'main' && format('{0}/{1}:latest', env.DOCKER_USERNAME, env.DOCKER_IMAGE_NAME) || '' }}
      
      - name: Deployment Summary
        run: |
          echo "## 🚀 Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ steps.get_version.outputs.branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | \`${{ steps.get_version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
