name: CI/CD ReactJS

on:
  push:
    branches: [ main ]
    paths:
      - 'FE/my-app/**'  # Chỉ chạy khi có thay đổi trong thư mục React
  pull_request:
    branches: [ main ]
    paths:
      - 'FE/my-app/**'

env:
  DOCKER_USERNAME: tam019
  DOCKER_IMAGE_NAME: solar-app
  WORKING_DIR: ./FE/my-app

jobs:
  # CI Job - Kiểm tra code
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json
      
      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: npm ci
      
      - name: Run lint
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          if [ -f package.json ] && grep -q "lint" package.json; then
            npm run lint
          else
            echo "No lint script found, skipping..."
          fi
      
      - name: Run tests
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          if [ -f package.json ] && grep -q "test" package.json; then
            npm run test -- --watchAll=false --passWithNoTests
          else
            echo "No test script found, skipping..."
          fi
      
      - name: Build project (test build)
        working-directory: ${{ env.WORKING_DIR }}
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-files
          path: ${{ env.WORKING_DIR }}/dist
          retention-days: 1

  # CD Job - Chỉ chạy khi CI thành công và là push vào main
  cd:
    name: Continuous Deployment
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.ci.result == 'success'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Lấy toàn bộ lịch sử để lấy tag
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json
      
      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: npm ci
      
      - name: Build project
        working-directory: ${{ env.WORKING_DIR }}
        run: npm run build
      
      - name: Get version from git commit
        id: get_version
        run: |
          # Lấy commit hash ngắn
          COMMIT_HASH=$(git rev-parse --short HEAD)
          
          # Lấy tag gần nhất
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          
          # Kiểm tra nếu commit hiện tại có tag không
          CURRENT_TAG=$(git tag --points-at HEAD 2>/dev/null | head -n1)
          
          if [ -n "$CURRENT_TAG" ]; then
            # Nếu commit có tag, sử dụng tag đó
            VERSION="$CURRENT_TAG"
            echo "Using tag from commit: $VERSION"
          else
            # Nếu không có tag, tạo version từ tag gần nhất + commit hash
            VERSION="${LATEST_TAG}-${COMMIT_HASH}"
            echo "No tag found, using: $VERSION"
          fi
          
          # Lưu version vào output và environment variable
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ${{ env.WORKING_DIR }}
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ steps.get_version.outputs.version }}
            ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Verify Docker image
        run: |
          echo "✅ Docker image pushed successfully:"
          echo "  - ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ steps.get_version.outputs.version }}"
          echo "  - ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest"
      
      - name: Create summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Docker Image** | \`${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | \`${{ steps.get_version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Deploy Time** | $(date) |" >> $GITHUB_STEP_SUMMARY
