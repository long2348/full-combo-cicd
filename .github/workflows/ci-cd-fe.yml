on:
  push:
    branches: [ main, dev ]
    tags:
      - 'v*'  # Chạy khi có tag mới
    paths:
      - 'FE/my-app/**'
  pull_request:
    branches: [ main, dev ]
    paths:
      - 'FE/my-app/**'
  workflow_dispatch:

env:
  DOCKER_USERNAME: tamtm019
  DOCKER_IMAGE_NAME: solar-app

jobs:
  ci:
    name: Test & Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install dependencies
        run: cd FE/my-app && npm ci
      
      - name: Build
        run: cd FE/my-app && npm run build
      
      - name: CI Success
        run: echo "✅ CI completed successfully!"

  cd:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || startsWith(github.ref, 'refs/tags/'))
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Lấy tất cả tags
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install and Build
        run: |
          cd FE/my-app
          npm ci
          npm run build
      
      - name: Get version
        id: version
        run: |
          # Lấy version từ tag nếu có, nếu không thì lấy branch name
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=${GITHUB_REF#refs/heads/}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./FE/my-app
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest
      
      - name: CD Success
        run: |
          echo "✅ Docker image pushed successfully!"
          echo "📦 Image: ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ steps.version.outputs.version }}"
          echo "🏷️  Tags: ${{ steps.version.outputs.version }}, latest"